apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: jano
  name: jenkins-role
rules:
- apiGroups: [""] # "" indicates the core API group
  resources: ["deployments"]
  verbs: ["create", "get", "watch", "list"]
  - apiGroups: [""] # "" indicates the core API group
  resources: ["replicasets"]
  verbs: ["create", "get", "watch", "list"]
  - apiGroups: [""] # "" indicates the core API group
  resources: ["pods"]
  verbs: ["create", "get", "watch", "list"]
  - apiGroups: [""] # "" indicates the core API group
  resources: ["namespaces"]
  verbs: ["create", "get", "watch", "list"]
  