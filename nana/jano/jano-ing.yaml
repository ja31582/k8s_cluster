apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jano-ing
  namespace: jano
  labels:
    app: jano-dj
spec:
  ingressClassName: nginx
  rules:
  - host: example.com
    http:
      paths:
      - backend:
          service:
            name: jano-svc
            port:
              number: 8080
        path: /
        pathType: Exact
